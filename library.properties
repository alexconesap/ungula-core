sentence=High-performance embedded C++ libraries for ESP32, STM32 and other MCUs: core utilities (time, preferences, CRC, queues, strings).
paragraph=Embedded C++17 core utilities: ungula::core::time free functions (millis/micros/delay abstraction with pluggable provider, sync clock, named timezones, ISO formatters), SystemControl reboot, ChipInfo diagnostics, NVS-backed preferences, ProgramStore with CRC, fixed-capacity Queue, string helpers, CRC32, temperature and math helpers. Supported targets: ESP32 fully; STM32 and other MCUs for the portable core (strings, queues, math, CRC) — NVS and ChipInfo are ESP-IDF only.
